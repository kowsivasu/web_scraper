<h2>Scraped Books</h2>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Price</th>
        <th>Stock Availability</th>
        <th>Image</th>
    </tr>

    {% for book in books %}
    <tr>
        <td>{{ book.title }}</td>
        <td>{{ book.price }}</td>
        <td>{{ book.stock }}</td>
        <td><img src="{{ book.image }}" width="100"></td>
    </tr>
    {% endfor %}
</table>
